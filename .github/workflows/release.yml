name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-image:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_HASH=${{ github.sha }}
          provenance: true
          sbom: true

  release-binaries:
    name: Release binaries
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          mise run release-notes -- "$VERSION" > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "::error::no CHANGELOG.md section for $VERSION"
            exit 1
          fi
          echo "RELEASE_NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"
          echo "--- $NOTES_FILE ---"
          cat "$NOTES_FILE"
      - run: mise run release-binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - name: Package chart with version synced to tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mise run helm-package -- "$VERSION"
      - name: Login to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push chart
        env:
          HELM_OCI_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts
        run: mise run helm-push
