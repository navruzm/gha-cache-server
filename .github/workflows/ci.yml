name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: mise run lint

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: mise run test
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  test-integration:
    name: Integration (${{ matrix.storage }} + ${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        storage: [filesystem, s3, gcs]
        db: [sqlite, postgres, mysql]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: mise run test-integration
        env:
          TEST_STORAGE_DRIVER: ${{ matrix.storage }}
          TEST_DB_DRIVER: ${{ matrix.db }}

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: mise run build
      - uses: actions/upload-artifact@v7
        with:
          name: cache-server-linux-amd64
          path: cache-server

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: mise run helm-lint
