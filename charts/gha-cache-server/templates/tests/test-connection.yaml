apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ghacs.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ghacs.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      args:
        - "-fsS"
        - "http://{{ include "ghacs.fullname" . }}:{{ .Values.service.port }}/health"
